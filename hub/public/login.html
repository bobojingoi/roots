<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Autentificare · Roots Hub</title>
<style>
  :root{--brand:#157a55;--brand-d:#0f6e56;--bg:#f5f7f6;--ink:#14201b;--muted:#5c6b64;--line:#e3e8e5}
  *{box-sizing:border-box;margin:0}
  body{font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(20,32,27,.08);padding:34px;width:100%;max-width:400px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .logo .dot{width:34px;height:34px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800}
  .logo b{font-size:19px;letter-spacing:.02em}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;font-family:inherit}
  input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,122,85,.14)}
  .row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13.5px;color:var(--muted)}
  .row input{width:auto}
  button{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--brand);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
  button:hover{background:var(--brand-d)}
  .err{display:none;margin-top:14px;background:#fdecec;color:#a32d2d;border-radius:10px;padding:10px 12px;font-size:13.5px}
</style>
</head>
<body>
<form class="card" id="f">
  <div class="logo"><span class="dot">R</span><b>Roots Hub</b></div>
  <div class="sub">Administrare Roots Villas</div>
  <label>Email</label>
  <input type="email" id="email" required autocomplete="username" />
  <label>Parolă</label>
  <input type="password" id="password" required autocomplete="current-password" />
  <div class="row"><input type="checkbox" id="remember" /> <span>Ține-mă minte 30 de zile</span></div>
  <button type="submit">Autentificare</button>
  <div class="err" id="err"></div>
</form>
<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.style.display = 'none';
  const r = await fetch('/api/v1/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      remember: document.getElementById('remember').checked,
    }),
  });
  if (r.ok) { location.href = '/admin'; return; }
  const j = await r.json().catch(() => ({}));
  err.textContent = j.error || 'Autentificare eșuată';
  err.style.display = 'block';
});
</script>
</body>
</html>
