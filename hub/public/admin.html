<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Roots Hub В· Administrare</title>
<style>
  :root{--brand:#157a55;--brand-d:#0f6e56;--brand-soft:#e1f5ee;--bg:#f5f7f6;--ink:#14201b;--muted:#5c6b64;--line:#e3e8e5;--red:#a32d2d;--amber:#ba7517}
  *{box-sizing:border-box;margin:0}
  body{font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px}
  a{color:var(--brand);text-decoration:none}
  /* topbar */
  .top{background:#0e1f19;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 22px}
  .top .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.02em}
  .top .logo .dot{width:30px;height:30px;border-radius:9px;background:var(--brand);display:grid;place-items:center}
  .top .logo small{display:block;font-weight:600;font-size:10.5px;letter-spacing:.14em;color:#9fd9c3}
  .top .acts{display:flex;align-items:center;gap:10px;font-size:13px}
  .top .acts span{color:#c8d5cf;margin-right:6px}
  .top button{background:#1c3129;border:1px solid #2c463b;color:#fff;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .top button:hover{background:#25423
6}
  /* layout */
  .wrap{display:grid;grid-template-columns:250px 1fr;gap:18px;padding:18px;max-width:1280px;margin:0 auto}
  @media(max-width:860px){.wrap{grid-template-columns:1fr}}
  .side{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(20,32,27,.06);padding:12px;height:fit-content;position:sticky;top:18px}
  .nav-i{display:flex;align-items:center;gap:10px;width:100%;padding:11px 13px;border:none;background:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;text-align:left}
  .nav-i:hover{background:var(--brand-soft);color:var(--brand-d)}
  .nav-i.on{background:var(--brand-soft);color:var(--brand-d)}
  .nav-i svg{width:18px;height:18px;flex-shrink:0}
  .nav-cap{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9aa8a1;padding:12px 13px 6px}
  .nav-toggle{display:block;width:100%;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit}
  .nav-toggle:hover{color:var(--brand-d)}
  main{min-width:0}
  h1{font-size:22px;margin-bottom:4px}
  .lead{color:var(--muted);font-size:13.5px;margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(20,32,27,.06);padding:20px;margin-bottom:16px}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
  .kpi b{display:block;font-size:26px;margin-top:6px}
  .kpi span{color:var(--muted);font-size:12.5px}
  /* editor */
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .sec-head h2{font-size:17px}
  .badge{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:100px}
  .badge.pub{background:var(--brand-soft);color:var(--brand-d)}
  .badge.mod{background:#faeeda;color:var(--amber)}
  .badge.del{background:#fbe3e0;color:#c0392b}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand-d)}
  .btn.s{background:#fff;border:1.5px solid var(--line);color:var(--ink)}.btn.s:hover{border-color:var(--brand);color:var(--brand-d)}
  .btn.d{background:#fff;border:1.5px solid #f0c9c9;color:var(--red)}
  label.f{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 5px;text-transform:capitalize}
  input.f,textarea.f{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
  input.f:focus,textarea.f:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,122,85,.12)}
  textarea.f{resize:vertical;min-height:64px}
  .arr{border:1px dashed var(--line);border-radius:12px;padding:12px;margin-top:6px}
  .arr-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;position:relative;background:#fbfcfb}
  .arr-item .rm{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;font-size:15px}
  .add{background:var(--brand-soft);color:var(--brand-d);border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit}
  /* media */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mcard{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .mcard img{width:100%;height:110px;object-fit:cover;display:block}
  .mcard .mi{padding:8px}
  .mcard input{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit}
  .mcard .del{width:100%;margin-top:6px;background:none;border:none;color:var(--red);font-size:11.5px;font-weight:700;cursor:pointer}
  .drop{border:2px dashed var(--line);border-radius:14px;padding:28px;text-align:center;color:var(--muted);margin-bottom:16px;cursor:pointer}
  .drop.on{border-color:var(--brand);background:var(--brand-soft)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0e1f19;color:#fff;padding:11px 22px;border-radius:100px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
  .toast.on{opacity:1}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px}
  .vlist{margin-top:10px}
  .vrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  dialog{border:none;border-radius:16px;padding:24px;max-width:420px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  dialog::backdrop{background:rgba(14,31,25,.45)}
  .donut{width:132px;height:132px;border-radius:50%;position:relative;margin:6px auto 14px}
  .donut::after{content:'';position:absolute;inset:24px;background:#fff;border-radius:50%}
  .dlegend{font-size:12.5px;display:grid;gap:5px}
  .dlegend div{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .dlegend i{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px;flex-shrink:0}
  .dlegend .lft{display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bars{display:flex;align-items:flex-end;gap:6px;height:210px;margin-top:26px}
  .bars .bar{height:100%;display:flex;align-items:flex-end;cursor:pointer}
  .bars .bar:hover i{filter:brightness(1.18)}
  .bars .bv{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#5c6b64;white-space:nowrap;padding-bottom:2px}
  .bar{flex:1;background:var(--brand-soft);border-radius:8px 8px 0 0;position:relative;min-height:3px}
  .bar i{position:relative;width:100%;background:linear-gradient(180deg,#1e9a6d,#157a55);border-radius:8px 8px 0 0;display:block;height:0;transition:height .9s cubic-bezier(.2,.7,.2,1)}
  .bars-l{display:flex;gap:6px;font-size:10.5px;color:#9aa8a1;margin-top:5px}
  .bars-l span{flex:1;text-align:center}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .anim{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
  .donut{transition:transform .3s}
  .card:hover .donut{transform:scale(1.04)}
  .tl-tip{position:fixed;z-index:999;background:#0e1f19;color:#fff;padding:9px 13px;border-radius:11px;font-size:12.5px;line-height:1.5;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none}
  .tl-tip b{color:#9fd9c3}
  svg .tl-dot{cursor:pointer;transition:r .15s}
  @media(max-width:640px){
    .top{flex-wrap:wrap;gap:8px;padding:10px 14px}
    .top .acts{flex-wrap:wrap}
    .wrap{padding:12px;gap:12px}
    .side{position:static}
    .sec-head{flex-direction:column;align-items:flex-start}
    .grid3{grid-template-columns:1fr 1fr}
    .card{padding:14px}
  }
</style>
</head>
<body>
<div class="top">
  <div class="logo"><span class="dot">R</span><div>Roots Hub<small>ADMINISTRARE</small></div></div>
  <div class="acts">
    <span id="who"></span>
    <button onclick="openSiteEditor()" style="background:var(--brand);border-color:var(--brand)">вңҸпёҸ Editor pe site</button>
    <button onclick="openAccount()">SetДғri cont</button>
    <button onclick="logout()">Deconectare</button>
  </div>
</div>

<div class="wrap">
  <aside class="side" id="nav"></aside>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<dialog id="accDlg">
  <h3 style="margin-bottom:12px">SetДғri cont</h3>
  <label class="f">Parola curentДғ *</label><input class="f" type="password" id="accCur" />
  <label class="f">Email nou (opИӣional)</label><input class="f" type="email" id="accEmail" />
  <label class="f">ParolДғ nouДғ (opИӣional)</label><input class="f" type="password" id="accPass" />
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn p" onclick="saveAccount()">SalveazДғ</button>
    <button class="btn s" onclick="document.getElementById('accDlg').close()">RenunИӣДғ</button>
  </div>
</dialog>

<script>
/* ============ state ============ */
let ME = null, PERMS = [], SECTIONS = [], MEDIA = [], TAB = 'panou', CUR = null;
/* rolul curent vede o zonДғ doar dacДғ e Г®n lista lui de permisiuni (owner le are pe toate) */
function can(area) { return PERMS.includes(area); }

const SECTION_META = {
  seo:             ['SEO global', 'Meta title, description, keywords, imagine OG'],
  hero:            ['Hero', 'Prima secИӣiune a site-ului'],
  about:           ['Despre', 'Titlu, paragrafe, statistici'],
  villas:          ['Cardurile vilelor', 'Redwood Иҷi Sequoia pe pagina principalДғ'],
  editorial:       ['Blocuri editoriale', 'Blocuri titlu + paragrafe'],
  common:          ['SpaИӣii comune', 'Text, facilitДғИӣi, imagine'],
  rules:           ['Regulile casei', 'Intro + listДғ reguli'],
  testimonials:    ['Testimoniale', 'Rating + recenzii'],
  video:           ['Video', 'Titlu, descriere, URL YouTube'],
  faq:             ['FAQ', 'ГҺntrebДғri pe categorii'],
  location:        ['LocaИӣie', 'Descriere, hartДғ, repere'],
  contact:         ['Contact & Social', 'Telefon, WhatsApp, email, social'],
  villa_redwood:   ['Vila Redwood', 'Pagina vilei: hero, galerii, facilitДғИӣi, Smoobu'],
  villa_sequoia:   ['Vila Sequoia', 'Pagina vilei: hero, galerii, facilitДғИӣi, Smoobu'],
  welcome_redwood: ['InstrucИӣiuni Redwood', 'Cod chei, WiFi, reguli, recomandДғri'],
  welcome_sequoia: ['InstrucИӣiuni Sequoia', 'Cod chei, WiFi, reguli, recomandДғri'],
  about_page:      ['Despre noi', 'Povestea Roots (pagina /despre-noi)'],
  legal_privacy:   ['Politica de confidenИӣialitate', 'Pagina legalДғ GDPR'],
  legal_cookies:   ['Politica de cookies', 'Pagina legalДғ cookies'],
  legal_terms:     ['Termeni Иҷi condiИӣii', 'Pagina legalДғ T&C'],
  extra_reviews:   ['Recenzii manuale', 'Recenzii adДғugate de tine, afiИҷate lГўngДғ cele Google (max ~5 de la API). country (originea clientului): ro / il / es / it / us / fr / de'],
  brand:           ['Logo & Brand', 'Logo (URL imagine; gol = textul R ROOTS) + overlay-ul pozei din hero: heroOverlayFrom (jos/sus/colturi/plin), heroOverlayHeight Иҷi heroOverlayOpacity (0вҖ“100), heroOverlayColor (hex)'],
  tracking:        ['Marketing & Tracking', 'ID-uri Google Analytics 4 (G-XXXX), Meta Pixel, TikTok Pixel вҖ” se Г®ncarcДғ doar cu consimИӣДғmГўnt cookie'],
};

/* meniul e organizat pe PAGINI вҖ” fiecare paginДғ se configureazДғ separat */
const PAGES_NAV = [
  { cap: 'Home page', keys: ['seo', 'hero', 'about', 'villas', 'editorial', 'common', 'rules', 'testimonials', 'extra_reviews', 'video', 'faq', 'location', 'contact'] },
  { cap: 'Vile & instrucИӣiuni', keys: ['villa_redwood', 'villa_sequoia', 'welcome_redwood', 'welcome_sequoia'] },
  { cap: 'Pagini text', keys: ['about_page', 'legal_privacy', 'legal_cookies', 'legal_terms'] },
  { cap: 'SetДғri site', keys: ['brand', 'tracking'] },
];

const SV = (d) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const ICONS = {
  home: SV('<path d="M3 11 12 4l9 7"/><path d="M5 10v10h14V10"/>'),
  bed: SV('<path d="M3 18v-7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v7"/><path d="M3 15h18M6.5 9V7.5A1.5 1.5 0 0 1 8 6h8a1.5 1.5 0 0 1 1.5 1.5V9"/>'),
  doc: SV('<path d="M6 3h9l4 4v14H6z"/><path d="M14 3v5h5M9 12h7M9 16h7"/>'),
  globe: SV('<circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.5 2.4 2.5 14.6 0 17M12 3.5c-2.5 2.4-2.5 14.6 0 17"/>'),
  cal: SV('<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/>'),
  users: SV('<circle cx="9" cy="8" r="3"/><path d="M4 19c.5-3 2.6-4.6 5-4.6s4.5 1.6 5 4.6"/><circle cx="17" cy="9" r="2.3"/><path d="M15.5 14c2.2.3 3.8 1.7 4.3 4.3"/>'),
  pen: SV('<path d="M4 20h4L19.5 8.5a2.1 2.1 0 0 0-3-3L5 17v3Z"/><path d="m14.5 7.5 3 3"/>'),
  star: SV('<path d="M12 3.5 14.6 8.8 20.5 9.7 16.2 13.8 17.3 19.6 12 16.8 6.7 19.6 7.8 13.8 3.5 9.7 9.4 8.8Z"/>'),
  user: SV('<circle cx="12" cy="8" r="3.4"/><path d="M5.5 20c.7-3.6 3.3-5.5 6.5-5.5s5.8 1.9 6.5 5.5"/>'),
  clock: SV('<circle cx="12" cy="12" r="8.5"/><path d="M12 7v5l3.5 2"/>'),
  palette: SV('<path d="M12 3.5a8.5 8.5 0 1 0 0 17c1.4 0 2-.8 2-1.8 0-.9-.6-1.4-.6-2.2 0-1 .8-1.8 2-1.8h1.8c1.9 0 3.3-1.4 3.3-3.2C20.5 7 16.7 3.5 12 3.5Z"/><circle cx="8" cy="10" r="1"/><circle cx="12" cy="7.5" r="1"/><circle cx="16" cy="10" r="1"/>'),
  seo: SV('<circle cx="10.5" cy="10.5" r="6.5"/><path d="m15.5 15.5 5 5"/>'),
  heat: SV('<path d="M12 3c1 3.5-3.5 5-3.5 9a3.5 3.5 0 0 0 7 0c0-1.6-.8-2.8-1.5-4"/><path d="M12 21a6.5 6.5 0 0 1-6.5-6.5C5.5 10 9 7.5 9.5 5c2 1.5 1 4 2.5 5.5C13.5 12 15 11 15 8.5c2 1.7 3.5 3.7 3.5 6A6.5 6.5 0 0 1 12 21Z"/>'),
  panou: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>',
  sec: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>',
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5-5 3 3 4-4 4 4"/></svg>',
  fin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2.5" y="6" width="19" height="12" rx="2.5"/><path d="M2.5 10h19"/><path d="M6 14.5h4"/></svg>',
  mkt: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11v3l4 1 8 4V5l-8 4-4 1z"/><path d="M15 8a4 4 0 0 1 0 8"/><path d="M7 15v4"/></svg>',
};

/* ============ helpers ============ */
const $ = (id) => document.getElementById(id);
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2400); }
async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (r.status === 401) { location.href = '/login'; throw new Error('401'); }
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || 'Eroare');
  return j;
}
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
// linkuri din date de utilizator: doar http(s), altfel nu randДғm <a> (anti javascript:)
const safeHref = (u) => (/^https?:\/\//i.test(String(u || '').trim()) ? String(u).trim() : null);

/* ============ nav ============ */
const SITE = location.hostname === 'localhost' ? 'http://localhost:5173' : 'https://rootsvillas.ro';
const SECTION_PATHS = {
  villa_redwood: '/vila-redwood', villa_sequoia: '/vila-sequoia',
  welcome_redwood: '/welcome-redwood', welcome_sequoia: '/welcome-sequoia',
  about_page: '/despre-noi', legal_privacy: '/politica-de-confidentialitate',
  legal_cookies: '/politica-cookies', legal_terms: '/termeni-si-conditii',
};
function livePageUrl(key) {
  const [base, lang] = key.split('@');
  const path = SECTION_PATHS[base] || '/';
  return SITE + path + (lang ? '?lang=' + lang : '');
}
let NAVOPEN = new Set();
function toggleGroup(key) { NAVOPEN.has(key) ? NAVOPEN.delete(key) : NAVOPEN.add(key); renderNav(); }
function renderNav() {
  const have = new Set(SECTIONS.map((s) => s.section_key));
  let h = '';
  if (can('panou')) h += `<button class="nav-i ${TAB === 'panou' ? 'on' : ''}" onclick="go('panou')">${ICONS.panou} Panou</button>`;
  const PAGE_ICONS = ['home', 'bed', 'doc'];
  const LANG_LABELS = { en: 'EnglezДғ', he: 'EbraicДғ', fr: 'FrancezДғ' };
  const activeSec = TAB.startsWith('sec:') ? TAB.slice(4) : null;
  const rootOpen = NAVOPEN.has('root') || Boolean(activeSec);
  if (can('continut')) {
  h += `<button class="nav-cap nav-toggle" onclick="toggleGroup('root')">${rootOpen ? '&#9662;' : '&#9656;'} ConИӣinut site</button>`;
  if (rootOpen) {
    PAGES_NAV.forEach((page, pi) => {
      const keys = page.keys.filter((k) => have.has(k));
      if (!keys.length) return;
      const act = keys.includes(activeSec);
      const open = NAVOPEN.has('pg' + pi) || act;
      h += `<button class="nav-cap nav-toggle" style="padding-left:22px" onclick="toggleGroup('pg${pi}')">${open ? '&#9662;' : '&#9656;'} ${esc(page.cap)}</button>`;
      if (open) for (const k of keys) {
        const [label] = SECTION_META[k] || [k];
        h += `<button class="nav-i ${TAB === 'sec:' + k ? 'on' : ''}" style="padding-left:28px" onclick="go('sec:${k}')">${ICONS[PAGE_ICONS[pi]] || ICONS.sec} ${esc(label)}</button>`;
      }
    });
    for (const lang of ['en', 'he', 'fr']) {
      const keys = SECTIONS.map((x) => x.section_key).filter((k) => k.endsWith('@' + lang)).sort();
      if (!keys.length) continue;
      const act = activeSec && activeSec.endsWith('@' + lang);
      const open = NAVOPEN.has('tr' + lang) || act;
      h += `<button class="nav-cap nav-toggle" style="padding-left:22px" onclick="toggleGroup('tr${lang}')">${open ? '&#9662;' : '&#9656;'} Traduceri В· ${LANG_LABELS[lang]}</button>`;
      if (open) for (const k of keys) {
        const base = k.split('@')[0];
        const [label] = SECTION_META[base] || [base];
        h += `<button class="nav-i ${TAB === 'sec:' + k ? 'on' : ''}" style="padding-left:28px" onclick="go('sec:${k}')">${ICONS.globe} ${esc(label)}</button>`;
      }
    }
  }
  } // end can('continut')
  if (can('rezervari') || can('clienti') || can('recenzii')) h += `<div class="nav-cap">CRM</div>`;
  if (can('rezervari')) h += `<button class="nav-i ${TAB === 'bookings' ? 'on' : ''}" onclick="go('bookings')">${ICONS.cal} RezervДғri</button>`;
  if (can('financiar')) h += `<button class="nav-i ${TAB === 'finance' ? 'on' : ''}" onclick="go('finance')">${ICONS.fin} Financiar</button>`;

async function renderCleaning() {
  if (!CL) { const n = new Date(); CL = { villa: 'Redwood', y: n.getFullYear(), m: n.getMonth() }; }

    $('main').innerHTML = '<h1>Calendar curДғИӣenie</h1><div class="card">Se Г®ncarcДғвҖҰ</div>';
    try { CL_DATA = (await api('/api/v1/admin/cleaning')).bookings || []; }
    catch (e) { $('main').innerHTML = '<div class="card">Nu am putut Г®ncДғrca rezervДғrile.</div>'; return; }
  }
  drawCleaning();
}
function clVilla(v) { CL.villa = v; drawCleaning(); }
function clMonth(delta) { let m = CL.m + delta, y = CL.y; if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; } CL.m = m; CL.y = y; drawCleaning(); }
function clToday() { const n = new Date(); CL.y = n.getFullYear(); CL.m = n.getMonth(); drawCleaning(); }

function drawCleaning() {
  const B = CL_DATA;
  const MON = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
  const MONs = ['ian', 'feb', 'mar', 'apr', 'mai', 'iun', 'iul', 'aug', 'sep', 'oct', 'nov', 'dec'];
  const DOWs = ['Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'SГў', 'Du'];
  const DOWf = ['Luni', 'MarИӣi', 'Miercuri', 'Joi', 'Vineri', 'SГўmbДғtДғ', 'DuminicДғ'];
  const pad = (n) => String(n).padStart(2, '0');
  const iso = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const parse = (s) => new Date(s + 'T12:00:00');
  const addD = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  const diff = (a, b) => Math.round((b - a) / 86400000);
  const todayStr = iso(new Date());
  const fmt = (ds) => { const d = parse(ds); return `${DOWf[(d.getDay() + 6) % 7]}, ${d.getDate()} ${MONs[d.getMonth()]}`; };
  const first = (s) => (String(s || '').trim().split(' ')[0] || 'Oaspete');
  // marcaj origine grup: he = evrei, orice altДғ limbДғ setatДғ вү  ro = strДғini
  const origin = (lang) => {
    if (lang === 'he') return { flag: 'рҹҮ®рҹҮұ', label: 'Evrei', cls: 'or-he' };
    if (lang && lang !== 'ro') return { flag: 'рҹҢҚ', label: 'StrДғini', cls: 'or-f' };
    return null;
  };
  const PAL = ['#e8722c', '#3a7d5d', '#5b7bd4', '#c0568f', '#d4a13a', '#7a8b52', '#4a9b8e', '#b5651d'];
  const cur = B.filter((b) => b.villa === CL.villa).map((b, i) => ({ ...b, color: PAL[i % PAL.length] }));

  const y = CL.y, m = CL.m;
  const firstDow = (new Date(y, m, 1).getDay() + 6) % 7;
  const daysIn = new Date(y, m + 1, 0).getDate();
  const gridStart = addD(parse(`${y}-${pad(m + 1)}-01`), -firstDow);
  const numWeeks = Math.ceil((firstDow + daysIn) / 7);
  const coSet = new Set(cur.map((b) => b.departure)); // zile de check-out (curДғИӣenie)

  // calendar cu BARE ce se Г®ntind pe zile (ca la Smoobu); o barДғ = o rezervare
  let weeksHtml = '';
  for (let w = 0; w < numWeeks; w++) {
    const wkStart = addD(gridStart, w * 7), wkEnd = addD(wkStart, 6);
    let dcells = '';
    for (let d = 0; d < 7; d++) {
      const dt = addD(wkStart, d), dsv = iso(dt);
      let cls = 'clc';

      if (dsv === todayStr) cls += ' clc-today';
      if (coSet.has(dsv)) cls += ' clc-co';
      dcells += `<div class="${cls}"><span class="clc-n">${dt.getDate()}</span></div>`;
    }
    let bars = '';
    cur.forEach((b) => {
      const a = parse(b.arrival), lastNight = addD(parse(b.departure), -1);
      const segStart = a > wkStart ? a : wkStart;
      const segEnd = lastNight < wkEnd ? lastNight : wkEnd;
      if (segStart > segEnd) return;
      const col = diff(wkStart, segStart), span = diff(segStart, segEnd) + 1;
      const startsHere = a >= wkStart && a <= wkEnd, endsHere = lastNight >= wkStart && lastNight <= wkEnd;
      let rad = '';

      bars += `<div class="clb" style="left:calc(100% * ${col} / 7 + 2px);width:calc(100% * ${span} / 7 - 4px);background:${b.color};${rad}" title="${esc(b.name)} В· ${b.guests || '?'} pers${o ? ' В· ' + o.label : ''} В· ${fmt(b.arrival)} вҶ’ ${fmt(b.departure)}${b.req ? ' В· ' + esc(b.req) : ''}">${txt}</div>`;
    });
    weeksHtml += `<div class="clw"><div class="clw-cells">${dcells}</div>${bars}</div>`;
  }

  const arrSorted = cur.slice().sort((a, b) => (a.arrival < b.arrival ? -1 : 1));

    const reqChip = b.req ? ` <span class="cl-req" title="${esc(b.req)}">рҹ“қ ${esc(b.req.slice(0, 40))}${b.req.length > 40 ? 'вҖҰ' : ''}</span>` : '';

    return `<div class="cl-row">
      <div class="cl-dep"><span class="cl-co-d">рҹ§№ ${fmt(b.departure)}</span> вҖ” pleacДғ <b>${esc(first(b.name))}</b> (${b.guests || '?'} pers)${orgChip}${reqChip}</div>
      ${nextBlock}
    </div>`;
  }).join('') || '<div class="hint">Nicio plecare programatДғ.</div>';

  // ALERTДӮ: doar zilele Г®n care AMBELE vile au check-in ИҳI check-out Г®n aceeaИҷi zi (turnover dublu)
  const turnovers = (v) => {
    const arr = new Set(B.filter((b) => b.villa === v).map((b) => b.arrival));
    return new Set(B.filter((b) => b.villa === v && b.departure >= todayStr && arr.has(b.departure)).map((b) => b.departure));
  };
  const tR = turnovers('Redwood'), tS = turnovers('Sequoia');
  const both = [...tR].filter((d) => tS.has(d)).sort();
  const alert = both.length ? `<div class="cl-alert">вҡ пёҸ <b>Check-in ИҳI check-out Г®n aceeaИҷi zi la AMBELE vile:</b> ${both.map((d) => fmt(d)).join(' В· ')}</div>` : '';

  $('main').innerHTML = `<style>
    .cl-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:8px 0 14px}
    .cl-vsel{display:flex;gap:8px}
    .cl-vb{padding:8px 16px;border:1.5px solid var(--line);background:#fff;border-radius:100px;font:600 14px inherit;cursor:pointer;color:var(--muted)}
    .cl-vb.on{background:var(--brand);border-color:var(--brand);color:#fff}
    .cl-nav{display:flex;align-items:center;gap:8px}
    .cl-nav button{width:36px;height:36px;border:1.5px solid var(--line);background:#fff;border-radius:9px;font-size:18px;cursor:pointer;color:var(--brand-d)}
    .cl-nav .cl-today{width:auto;padding:0 14px;font-size:13px;font-weight:700}
    .cl-mtitle{font-weight:800;color:var(--brand-d);min-width:150px;text-align:center}
    .cl-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
    .cl-dow span{text-align:center;font-size:11px;font-weight:700;color:#9aa8a1}
    .clw{position:relative}
    .clw-cells{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid #eef1ef;border-top:1px solid #eef1ef}
    .clw:first-of-type .clw-cells{border-radius:8px 8px 0 0}
    .clw:last-of-type .clw-cells{border-radius:0 0 8px 8px;overflow:hidden}
    .clc{min-height:52px;border-right:1px solid #eef1ef;border-bottom:1px solid #eef1ef;padding:3px 5px;position:relative}
    .clc-out{background:#fafbfa}
    .clc-n{font-size:12px;font-weight:700;color:#5c6b64}
    .clc-out .clc-n{color:#c3ccc7}
    .clc-today .clc-n{background:var(--brand);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center}
    .clc-co::after{content:'';position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#c0392b}
    .clb{position:absolute;top:23px;height:19px;line-height:19px;color:#fff;font-size:10.5px;font-weight:700;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box;z-index:2}
    .cl-list .cl-row{padding:12px 0;border-bottom:1px solid var(--line)}

    @media(max-width:560px){.clc{min-height:46px}.clb{font-size:9.5px;padding:0 4px}}
  </style>

    <div class="lead">Alege vila Иҷi luna. Fiecare <b>barДғ coloratДғ</b> = o rezervare (nume + persoane). <span style="color:#c0392b">в—Ҹ</span> roИҷu = check-out (curДғИӣenie). рҹ“қ = cerinИӣe. рҹҮ®рҹҮұ = grup evreiesc В· рҹҢҚ = grup strДғin.</div>

/* ============ editor generic (recursiv) ============ */
function fieldHtml(path, key, val) {
  const label = esc(key);
  if (key === 'titleSize') {
    const opts = [['s', 'Mic'], ['m', 'Mediu'], ['l', 'Mare'], ['xl', 'Foarte mare']];
    return `<label class="f">MДғrimea titlului</label><select class="f" data-path="${path}">${opts.map(([v, n]) =>
      `<option value="${v}" ${val === v ? 'selected' : ''}>${n}</option>`).join('')}</select>`;
  }
  if (typeof val === 'string') {
    const long = val.length > 80;
    return `<label class="f">${label}</label>` + (long
      ? `<textarea class="f" data-path="${path}">${esc(val)}</textarea>`
      : `<input class="f" data-path="${path}" value="${esc(val)}" />`);
  }
  if (typeof val === 'number') return `<label class="f">${label}</label><input class="f" data-path="${path}" data-num="1" value="${val}" />`;
  if (val === null) return `<label class="f">${label}</label><input class="f" data-path="${path}" placeholder="(gol вҖ” ex. URL imagine)" value="" />`;
  if (Array.isArray(val)) {
    let inner = val.map((item, i) =>
      `<div class="arr-item"><button class="rm" onclick="arrRemove('${path}',${i})" title="Иҳterge">Г—</button>${objHtml(path + '.' + i, item)}</div>`
    ).join('');
    return `<label class="f">${label}</label><div class="arr">${inner}<button class="add" onclick="arrAdd('${path}')">+ AdaugДғ element</button></div>`;
  }
  if (typeof val === 'object') return `<label class="f">${label}</label><div class="arr">${objHtml(path, val)}</div>`;
  return '';
}
function objHtml(path, obj) {
  if (typeof obj === 'string') {
    const long = obj.length > 80;
    return long ? `<textarea class="f" data-path="${path}">${esc(obj)}</textarea>` : `<input class="f" data-path="${path}" value="${esc(obj)}" />`;
  }
  if (typeof obj !== 'object' || obj === null) return `<input class="f" data-path="${path}" value="${esc(obj ?? '')}" />`;
  return Object.entries(obj).map(([k, v]) => fieldHtml(path + '.' + k, k, v)).join('');
}
function getByPath(obj, path) { return path.split('.').slice(1).reduce((o, k) => o?.[k], obj); }
function setByPath(obj, path, value) {
  const keys = path.split('.').slice(1);
  let o = obj;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = value;
}
function collectDraft() {
  const draft = JSON.parse(JSON.stringify(CUR.draft));
  document.querySelectorAll('[data-path]').forEach((el) => {
    let v = el.value;
    if (el.dataset.num) v = Number(v) || 0;
    if (v === '' && getByPath({ root: CUR.draft }, el.dataset.path) === null) v = null;
    setByPath({ root: draft }, el.dataset.path, v);
  });
  return draft;
}
function arrRemove(path, idx) {
  CUR.draft = collectDraft();
  const arr = getByPath({ root: CUR.draft }, path);
  arr.splice(idx, 1);
  renderMain();
}
function arrAdd(path) {
  CUR.draft = collectDraft();
  const arr = getByPath({ root: CUR.draft }, path);
  const template = arr.length ? JSON.parse(JSON.stringify(arr[arr.length - 1])) : '';
  const blank = (x) => {
    if (typeof x === 'string') return '';
    if (typeof x === 'number') return 0;
    if (Array.isArray(x)) return [];
    if (x && typeof x === 'object') { const o = {}; for (const k of Object.keys(x)) o[k] = blank(x[k]); return o; }
    return '';
  };
  arr.push(blank(template));
  renderMain();
}

const SEO_PAGES = [
  ['/', 'Pagina principalДғ'], ['/vila-redwood', 'Vila Redwood'], ['/vila-sequoia', 'Vila Sequoia'],
  ['/rezervare', 'Rezervare'], ['/blog', 'Blog'], ['/despre-noi', 'Despre noi'],
  ['/termeni-si-conditii', 'Termeni'], ['/politica-de-confidentialitate', 'ConfidenИӣialitate'],
];
let SEO_RES = {};
async function renderSeo() {
  $('main').innerHTML = `
    <h1>Audit SEO</h1>
    <div class="lead">AnalizeazДғ HTML-ul livrat de site вҖ” exact ce vДғd Google Иҷi LLM-urile (ChatGPT, Claude, Perplexity) Г®nainte sДғ ruleze JavaScript.</div>
    <div class="card" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn p" onclick="runSeoAll(this)">RuleazДғ auditul pe toate paginile</button>
      <span class="hint">AuditeazДғ pagina live (${esc(SITE)}). DureazДғ cГўteva secunde.</span>
    </div>
    <div id="seoOut">${seoResultsHtml()}</div>`;
}
function seoBadge(l) {
  const map = { ok: ['#157a55', 'OK'], warn: ['#c98a06', 'De Г®mbunДғtДғИӣit'], fail: ['#c0392b', 'ProblemДғ'] };
  const [c, t] = map[l] || map.warn;
  return `<span style="display:inline-block;min-width:96px;text-align:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;background:${c}">${t}</span>`;
}
function seoResultsHtml() {
  const keys = Object.keys(SEO_RES);
  if (!keys.length) return '<div class="card"><div class="hint">Niciun audit rulat Г®ncДғ.</div></div>';
  let score = { ok: 0, warn: 0, fail: 0 };
  keys.forEach((k) => SEO_RES[k].checks.forEach((c) => score[c.level] = (score[c.level] || 0) + 1));
  let h = `<div class="card"><b>Rezumat:</b> <span style="color:#157a55;font-weight:700">${score.ok} OK</span> В·
    <span style="color:#c98a06;font-weight:700">${score.warn} de Г®mbunДғtДғИӣit</span> В·
    <span style="color:#c0392b;font-weight:700">${score.fail} probleme</span>
    <div class="hint" style="margin-top:6px">Prioritate: rezolvДғ Г®ntГўi вҖһProblemДғ", apoi вҖһDe Г®mbunДғtДғИӣit". RecomandДғrile pentru LLM-uri (llms.txt, conИӣinut Г®n HTML, JSON-LD) conteazДғ tot mai mult вҖ” asistenИӣii AI recomandДғ cazДғri direct.</div></div>`;
  for (const k of keys) {
    const r = SEO_RES[k];
    const label = (SEO_PAGES.find((x) => x[0] === k) || [k, k])[1];
    h += `<div class="card"><b>${esc(label)}</b> <span class="hint">${esc(k)}</span>
      <div style="margin-top:10px;display:grid;gap:8px">` +
      r.checks.map((c) => `<div style="display:flex;gap:10px;align-items:flex-start">
        ${seoBadge(c.level)}
        <div style="flex:1;min-width:0"><b style="font-size:13px">${esc(c.title)}</b>
        ${c.advice ? `<div class="hint" style="white-space:normal;margin-top:2px">${esc(c.advice)}</div>` : ''}</div></div>`).join('') +
      `</div></div>`;
  }
  return h;
}
async function runSeoAll(btn) {
  btn.disabled = true; btn.textContent = 'AnalizezвҖҰ';
  for (const [p] of SEO_PAGES) {
    try { SEO_RES[p] = await api('/api/v1/admin/seo-audit?path=' + encodeURIComponent(p)); }
    catch (e) { SEO_RES[p] = { checks: [{ level: 'fail', title: 'Eroare: ' + e.message, advice: '' }] }; }
    const out = $('seoOut'); if (out) out.innerHTML = seoResultsHtml();
  }
  btn.disabled = false; btn.textContent = 'RuleazДғ auditul pe toate paginile';
}

async function renderHeatmap() {
  $('main').innerHTML = `

      </select>
      <select class="f" style="width:auto" onchange="HM.device=this.value;loadHeatmap()">
        <option value="desktop" ${HM.device === 'desktop' ? 'selected' : ''}>Desktop</option>
        <option value="mobile" ${HM.device === 'mobile' ? 'selected' : ''}>Mobil</option>
      </select>
      <span class="hint" id="hmInfo"></span>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div id="hmWrap" style="position:relative;height:70vh;overflow:auto;background:#fff">
        <iframe id="hmFrame" style="border:0;display:block;pointer-events:none" scrolling="no"></iframe>
        <canvas id="hmCanvas" style="position:absolute;left:0;top:0;pointer-events:none"></canvas>
      </div>
    </div>`;
  loadHeatmap();
}
async function loadHeatmap() {
  const info = $('hmInfo');
  info.textContent = 'Se Г®ncarcДғвҖҰ';
  let j;
  try { j = await api(`/api/v1/admin/heatmap?path=${encodeURIComponent(HM.path)}&device=${HM.device}`); }
  catch (e) { info.textContent = e.message; return; }
  const W = HM.device === 'mobile' ? 390 : 1280;
  const H = Math.max(1200, Math.min(20000, j.docH || 4000));
  const frame = $('hmFrame'), cv = $('hmCanvas');
  frame.width = W; frame.style.width = W + 'px'; frame.style.height = H + 'px';
  frame.src = SITE + HM.path;
  cv.width = W; cv.height = H; cv.style.width = W + 'px'; cv.style.height = H + 'px';
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  for (const pt of j.points) {
    const gx = pt.x * W, gy = pt.y;
    const g = ctx.createRadialGradient(gx, gy, 2, gx, gy, 34);
    g.addColorStop(0, 'rgba(255,60,30,.35)');
    g.addColorStop(.5, 'rgba(255,140,0,.16)');
    g.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(gx - 34, gy - 34, 68, 68);
  }
  info.textContent = j.total
    ? `${j.total} click-uri Г®nregistrate (${HM.device}). RoИҷu intens = multe click-uri.`
    : 'Niciun click Г®nregistrat Г®ncДғ pe aceastДғ paginДғ/dispozitiv вҖ” datele apar dupДғ ce vizitatorii folosesc site-ul.';
}

/* ============ dashboard statistici ============ */
const DPAL = ['#157a55', '#e8722c', '#378add', '#e9b872', '#d4537e', '#7f77dd', '#5f5e5a'];
let DASH_Y = String(new Date().getFullYear()), DASH_M = '';
function dashYear(v) { DASH_Y = v; DASH_M = ''; renderDash(); }
function dashMonth(v) { DASH_M = v; renderDash(); }
function countUp(el, target, fmt) {
  const t0 = performance.now(), dur = 750;
  function tick(t) {
    const k = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - k, 3);
    el.textContent = fmt(target * e);
    if (k < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  // plasДғ de siguranИӣДғ: Г®n tab-uri de fundal rAF e Г®ngheИӣat вҖ” fixДғm valoarea finalДғ
  setTimeout(() => { el.textContent = fmt(target); }, dur + 150);
}
function donut(title, rows, valueKey, fmt) {
  const data = {};
  rows.forEach((r) => { data[r.channel] = (data[r.channel] || 0) + Number(r[valueKey] || 0); });
  const entries = Object.entries(data).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, [, v]) => s + v, 0);
  if (!total) return `<div class="card" style="text-align:center"><b>${title}</b><div class="hint" style="padding:30px 0">FДғrДғ date</div></div>`;
  let acc = 0;
  const segs = entries.map(([, v], i) => {
    const from = (acc / total) * 360; acc += v;
    return `${DPAL[i % DPAL.length]} ${from}deg ${(acc / total) * 360}deg`;
  });
  return `<div class="card">
    <b>${esc(title)}</b>
    <div class="donut" style="background:conic-gradient(${segs.join(',')})"></div>
    <div class="dlegend">${entries.map(([k, v], i) =>
      `<div><span class="lft"><i style="background:${DPAL[i % DPAL.length]}"></i>${esc(k)}</span><b>${((v / total) * 100).toFixed(1)}%${fmt ? ' В· ' + fmt(v) : ''}</b></div>`
    ).join('')}</div>
  </div>`;
}
async function renderDash() {
  const m = $('main');
  m.innerHTML = '<h1>Panou de control</h1><div class="lead">Se Г®ncarcДғ statisticileвҖҰ</div>';
  let st = { byChannel: [], monthly: [], years: [] };
  try { st = await api('/api/v1/admin/stats?year=' + (DASH_Y || '') + '&month=' + (DASH_M || '')); } catch (e) {}
  const conf = st.byChannel.filter((r) => r.status === 'confirmed');
  const canc = st.byChannel.filter((r) => r.status === 'cancelled');
  const sum = (rows, k) => rows.reduce((s, r) => s + Number(r[k] || 0), 0);
  const revenue = sum(conf, 'revenue'), nB = sum(conf, 'n'), nights = sum(conf, 'nights'), nC = sum(canc, 'n');
  const periodDays = DASH_M ? 30.4 : (DASH_Y ? 365 : Math.max(1, st.years.length) * 365);
  const occupancy = Math.min(100, (nights / (periodDays * 2)) * 100);
  const lei = (v) => Number(v).toLocaleString('ro-RO', { maximumFractionDigits: 0 }) + ' lei';
  const M = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Noi', 'Dec'];
  const byM = Array.from({ length: 12 }, (_, i) => st.monthly.find((x) => x.month === i + 1) || { revenue: 0, n: 0 });
  const maxR = Math.max(1, ...byM.map((x) => x.revenue));
  const pub = SECTIONS.filter((sc) => sc.published).length;
  m.innerHTML = `
    <div class="sec-head"><div><h1>Panou de control</h1><div class="lead">Statistici din rezervДғrile Smoobu (sincronizate).</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <select class="f" style="max-width:130px" onchange="dashYear(this.value)">
          <option value="" ${!DASH_Y ? 'selected' : ''}>ToИӣi anii</option>
          ${st.years.map((y) => `<option ${String(y) === DASH_Y ? 'selected' : ''}>${y}</option>`).join('')}
        </select>
        <select class="f" style="max-width:140px" onchange="dashMonth(this.value)" ${!DASH_Y ? 'disabled' : ''}>
          <option value="">Tot anul</option>
          ${MONTH_NAMES.map((n, i) => `<option value="${i + 1}" ${String(i + 1) === DASH_M ? 'selected' : ''}>${n}</option>`).join('')}
        </select>
      </div></div>
    <div class="grid3">
      <div class="kpi anim"><span>venituri (confirmate)</span><b data-cnt="${revenue}" data-fmt="lei">0</b></div>
      <div class="kpi anim" style="animation-delay:.06s"><span>rezervДғri</span><b data-cnt="${nB}" data-fmt="int">0</b></div>
      <div class="kpi anim" style="animation-delay:.12s"><span>nopИӣi</span><b data-cnt="${nights}" data-fmt="int">0</b></div>
      <div class="kpi anim" style="animation-delay:.18s"><span>anulДғri</span><b data-cnt="${nC}" data-fmt="int">0</b></div>
      <div class="kpi anim" style="animation-delay:.24s"><span>grad de ocupare (2 vile)</span><b data-cnt="${occupancy.toFixed(1)}" data-fmt="pct">0</b></div>
    </div>
    ${st.byChannel.length === 0 ? `<div class="card" style="margin-top:16px"><b>FДғrДғ date Г®ncДғ</b><div class="hint">ApasДғ вҖһSincronizeazДғ din Smoobu" Г®n CRM вҶ’ RezervДғri. Sync-ul aduce acum Г®ntregul istoric (din 2019) Иҷi anulДғrile.</div></div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:16px">
      <div class="anim" style="animation-delay:.1s">${donut('Venituri / canal', conf, 'revenue', lei)}</div>
      <div class="anim" style="animation-delay:.18s">${donut('RezervДғri / canal', conf, 'n', null)}</div>
      <div class="anim" style="animation-delay:.26s">${donut('NopИӣi / canal', conf, 'nights', null)}</div>
      <div class="anim" style="animation-delay:.34s">${donut('AnulДғri / canal', canc, 'n', null)}</div>
    </div>
    <div class="card anim" style="margin-top:12px;animation-delay:.2s">
      <b>Venituri pe luni${DASH_Y ? ' В· ' + DASH_Y : ' В· toИӣi anii'}</b>
      <div class="bars">${byM.map((x, i) => `<div class="bar" title="${M[i]}: ${lei(x.revenue)} В· ${x.n} rezervДғri" onclick="if(DASH_Y)dashMonth('${i + 1}')"><i data-h="${Math.round((x.revenue / maxR) * 100)}">${x.revenue ? `<span class="bv">${compact(x.revenue)}</span>` : ''}</i></div>`).join('')}</div>
      <div class="bars-l">${M.map((n) => `<span>${n}</span>`).join('')}</div>
    </div>
    ${timelineChart(st.timeline || [])}`}`;
  // animaИӣii: count-up pe KPI + barele cresc din 0
  m.querySelectorAll('[data-cnt]').forEach((el) => {
    const v = parseFloat(el.dataset.cnt), f = el.dataset.fmt;
    const fmt = f === 'lei' ? (x) => lei(x) : f === 'pct' ? (x) => x.toFixed(1) + '%' : (x) => String(Math.round(x));
    countUp(el, v, fmt);
  });
  setTimeout(() => {
    m.querySelectorAll('.bar i').forEach((el) => { el.style.height = el.dataset.h + '%'; });
  }, 60);
  attachTimelineTip();
}
function compact(v) { return v >= 1000 ? (v / 1000).toFixed(v >= 100000 ? 0 : 1).replace('.0', '') + 'k' : String(Math.round(v)); }
function timelineChart(tl) {
  if (!tl || tl.length < 2) return '';
  const W = 900, H = 200, PAD = 34;
  const maxV = Math.max(...tl.map((p) => p.revenue), 1);
  const x = (i) => PAD + (i / (tl.length - 1)) * (W - PAD * 2);
  const y = (v) => H - 26 - (v / maxV) * (H - 56);
  const pts = tl.map((p, i) => `${x(i).toFixed(1)},${y(p.revenue).toFixed(1)}`).join(' ');
  const area = `${PAD},${H - 26} ${pts} ${(W - PAD).toFixed(1)},${H - 26}`;
  const janLabels = tl.map((p, i) => (p.m === 1 || i === 0) ? `<text x="${x(i).toFixed(1)}" y="${H - 8}" font-size="11" fill="#9aa8a1" text-anchor="middle">${p.y}</text>` : '').join('');
  const dots = tl.map((p, i) => `<circle class="tl-dot" data-i="${i}" data-y="${p.y}" data-m="${p.m}" data-rev="${p.revenue}" data-n="${p.n}" cx="${x(i).toFixed(1)}" cy="${y(p.revenue).toFixed(1)}" r="3.6" fill="#157a55"></circle>`).join('');
  return `<div class="card anim" style="margin-top:12px;animation-delay:.3s">
    <b>EvoluИӣia veniturilor Г®n timp</b>
    <div class="hint" style="margin-top:2px">Hover pe puncte pentru detalii В· click pe un vГўrf sare direct la luna respectivДғ.</div>
    <div class="tl-tip" id="tlTip"></div>
    <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:560px;margin-top:8px">
      <text x="${PAD}" y="16" font-size="11" fill="#9aa8a1">max ${compact(maxV)} lei</text>
      <line x1="${PAD}" y1="${H - 26}" x2="${W - PAD}" y2="${H - 26}" stroke="#e3e8e5" stroke-width="1" />
      <polygon points="${area}" fill="rgba(21,122,85,.12)" />
      <polyline points="${pts}" fill="none" stroke="#157a55" stroke-width="2.4" stroke-linejoin="round" />
      ${dots}
      ${janLabels}
    </svg></div>
  </div>`;
}

function attachTimelineTip() {
  const tip = $('tlTip');
  if (!tip) return;
  const MN = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
  document.querySelectorAll('.tl-dot').forEach((c) => {
    c.addEventListener('mouseenter', (e) => {
      c.setAttribute('r', '6');
      tip.innerHTML = `<b>${MN[c.dataset.m - 1]} ${c.dataset.y}</b><br>${Number(c.dataset.rev).toLocaleString('ro-RO')} lei В· ${c.dataset.n} rezervДғri`;
      tip.style.display = 'block';
    });
    c.addEventListener('mousemove', (e) => { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 14) + 'px'; });
    c.addEventListener('mouseleave', () => { c.setAttribute('r', '3.6'); tip.style.display = 'none'; });
    c.addEventListener('click', () => { DASH_Y = String(c.dataset.y); DASH_M = String(c.dataset.m); renderDash(); });
  });
}

async function syncSmoobu(btn) {
  btn.disabled = true;
  let page = 1, totalSeen = 0, totalNew = 0;
  try {
    for (let i = 0; i < 40 && page; i++) {
      btn.textContent = `Se sincronizeazДғвҖҰ pagina ${page}`;
      const j = await api('/api/v1/admin/sync-smoobu', { method: 'POST', body: JSON.stringify({ startPage: page }) });
      totalSeen += j.seen; totalNew += j.created;
      toast(`Pagina ${page}${j.pages ? '/' + j.pages : ''} В· ${totalSeen} rezervДғri (${totalNew} noi)`);
      page = j.nextPage;
    }
    toast(`Gata: ${totalSeen} rezervДғri sincronizate (${totalNew} noi)`);
    if (TAB === 'bookings') renderBookings(); else if (TAB === 'guests') renderGuests(); else renderDash();
  } catch (e) { toast(e.message); btn.disabled = false; btn.textContent = 'SincronizeazДғ din Smoobu'; }
}

let MK_DAYS = 28, MK_CUR = '';

/* badge de status al campaniei (effective_status reflectДғ Иҷi вҖһГ®n verificare") */
function mkStatusBadge(c) {
  const s = (c.effectiveStatus || c.status || '').toUpperCase();
  if (s === 'ACTIVE') return '<span class="badge pub">activДғ</span>';
  if (s === 'PAUSED') return '<span class="badge mod">pe pauzДғ</span>';
  if (s.includes('REVIEW') || s === 'PENDING_REVIEW') return '<span class="badge mod">Г®n verificare</span>';
  if (s.includes('DISAPPROVED') || s.includes('WITH_ISSUES')) return '<span class="badge del">problemДғ</span>';
  return `<span class="badge mod">${esc(s.toLowerCase().replace(/_/g, ' '))}</span>`;
}
/* acИӣiuni de optimizare вҖ” confirmate, cu re-Г®ncДғrcare dupДғ */
async function mkSetStatus(id, status) {
  if (!confirm(status === 'PAUSED' ? 'Pui campania pe pauzДғ?' : 'Activezi campania?')) return;
  try { await api('/api/v1/admin/marketing/campaign/' + id + '/status', { method: 'POST', body: JSON.stringify({ status }) }); toast('Gata вң“'); renderMarketing(true); }

async function mkSetBudget(id, current) {
  const v = prompt('Buget zilnic nou' + (MK_CUR ? ' (' + MK_CUR + ')' : '') + ':', current != null ? current : '');

  const n = Number(String(v).replace(',', '.'));

  try { await api('/api/v1/admin/marketing/campaign/' + id + '/budget', { method: 'POST', body: JSON.stringify({ dailyBudget: n }) }); toast('Buget actualizat вң“'); renderMarketing(true); }

let FIN = [], FIN_F = { y: '', m: '' }, FIN_CFG = false;
const finLei = (v) => (v == null ? 'вҖ”' : Number(v).toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' lei');
function finFilter(k, v) { FIN_F[k] = v; renderFinanceList(); }
async function renderFinance() {

function renderFinanceList() {
  const rows = FIN.filter((p) => {
    const d = new Date(p.created_at);
    if (FIN_F.y && String(d.getFullYear()) !== FIN_F.y) return false;
    if (FIN_F.m && String(d.getMonth() + 1) !== FIN_F.m) return false;
    return true;
  });
  const n = (v) => Number(v) || 0;
  // Г®ncasat brut = tot ce a intrat (plДғtite + refundate ulterior); netul scade
  // refundurile Иҷi comisioanele Stripe (comisionul NU se Г®ntoarce la refund)
  const paidRows = rows.filter((p) => p.status === 'paid');
  const revRows = rows.filter((p) => p.status === 'refunded' || p.status === 'disputed');
  const gross = rows.reduce((s, p) => s + n(p.amount), 0);
  const refunded = revRows.reduce((s, p) => s + n(p.refund_amount != null ? p.refund_amount : p.amount), 0)
    + paidRows.reduce((s, p) => s + n(p.refund_amount), 0); // refunduri parИӣiale pe plДғИӣi Г®ncДғ active
  const fees = rows.reduce((s, p) => s + n(p.fee), 0);
  const feesKnown = rows.filter((p) => p.fee != null).length;
  const net = gross - refunded - fees;
  const card = (label, val, hint) => `<div class="card" style="padding:16px 18px"><div class="hint">${label}</div>
    <div style="font-size:22px;font-weight:800;margin-top:4px">${finLei(val)}</div>${hint ? `<div class="hint" style="margin-top:4px">${hint}</div>` : ''}</div>`;
  $('finCards').innerHTML =
    card('ГҺncasat (brut)', gross, `${rows.length} plДғИӣi`) +
    card('Refundat / disputat', refunded, `${revRows.length} plДғИӣi`) +
    card('Comision Stripe', fees, feesKnown < rows.length ? `cunoscut pe ${feesKnown}/${rows.length}` : '') +
    card('Net estimat', net, 'brut вҲ’ refunduri вҲ’ comisioane');
  const badge = (st) => st === 'paid'
    ? '<span class="badge pub">plДғtit</span>'
    : st === 'refunded' ? '<span class="badge mod">refundat</span>' : `<span class="badge mod">${esc(st)}</span>`;
  $('finList').innerHTML = `
    <div class="vrow" style="color:#5c6b64"><span><b>${rows.length}</b> plДғИӣi</span><span>avansuri Stripe</span></div>
    ${rows.map((p) => `
      <div class="vrow" style="gap:14px">
        <span style="min-width:0"><b>${esc(p.guest_email || 'fДғrДғ email')}</b>
          <span style="color:#9aa8a1"> В· ${new Date(p.created_at).toLocaleString('ro-RO')} В· rezervarea #${esc(p.ref || 'вҖ”')}</span>
          ${p.payment_intent ? `<a href="https://dashboard.stripe.com/payments/${encodeURIComponent(p.payment_intent)}" target="_blank" rel="noopener" style="margin-left:8px;font-size:12px">Stripe вҶ—</a>` : ''}</span>
        <span style="white-space:nowrap;text-align:right">
          <b>${finLei(p.amount)}</b>
          <span style="color:#9aa8a1"> В· com. ${finLei(p.fee)}</span>
          ${p.refund_amount != null && p.status === 'paid' ? `<span style="color:#c0392b"> В· refund parИӣial ${finLei(p.refund_amount)}</span>` : ''}
          ${badge(p.status)}</span>
      </div>`).join('') || '<div class="hint" style="padding:12px 0">Nicio platДғ online Г®ncДғ.</div>'}`;
}

        ${ROLES_DATA.areas.map(([k, label]) => `<tr style="border-top:1px solid #edf0ee">

        </tr>`).join('')}
      </table>

}
function togglePerm(role, area, on) {
  const list = new Set(ROLES_DATA.perms[role] || []);
  if (on) list.add(area); else list.delete(area);
  ROLES_DATA.perms[role] = [...list];
}
function addRole() {
  const name = ($('newRole').value || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
  if (!name || name === 'owner' || ROLES_DATA.perms[name]) { toast('Nume invalid sau deja existent'); return; }
  ROLES_DATA.perms[name] = [];
  paintRoles();
}
async function saveRoles(btn) {
  btn.disabled = true;
  try {
    const j = await api('/api/v1/admin/permissions', { method: 'PUT', body: JSON.stringify({ perms: ROLES_DATA.perms }) });
    ROLES_DATA.perms = j.perms;
    toast('Permisiuni salvate вҖ” se aplicДғ la urmДғtorul login al fiecДғrui rol');
    paintRoles();
  } catch (e) { toast(e.message); }
  btn.disabled = false;
}

  $('main').innerHTML = `

function newPost() { POST = { id: null, title: '', slug: '', excerpt: '', cover: '', body: '', blocks: [], seo_title: '', seo_description: '', published_at: null }; renderPostEditor(); }

/* ---- blocuri de conИӣinut ---- */
const BLOCK_LABELS = { text: 'рҹ“қ Text', images: 'рҹ–јпёҸ Poze', slider: 'рҹҺһпёҸ Slider', compare: 'вҡ–пёҸ ComparaИӣie', checklist: 'вң… Checklist' };
function addBlock(type) {
  if (!Array.isArray(POST.blocks)) POST.blocks = [];
  const tpl = type === 'text' ? { type, md: '' }
    : type === 'images' || type === 'slider' ? { type, urls: [] }
    : type === 'compare' ? { type, title_a: '', title_b: '', rows: [] }
    : { type, title: '', items: [] };
  POST.blocks.push(tpl);
  renderPostEditor();
}
function delBlock(i) { POST.blocks.splice(i, 1); renderPostEditor(); }
function mvBlock(i, d) { const j = i + d; if (j < 0 || j >= POST.blocks.length) return; [POST.blocks[i], POST.blocks[j]] = [POST.blocks[j], POST.blocks[i]]; renderPostEditor(); }
const NL = String.fromCharCode(10);
function setLines(i, key, val) { POST.blocks[i][key] = val.split(NL).map((s) => s.trim()).filter(Boolean); }
function setRows(i, val) { POST.blocks[i].rows = val.split(NL).map((s) => s.trim()).filter(Boolean).map((s) => { const p = s.split('|'); return { a: (p[0] || '').trim(), b: (p[1] || '').trim() }; }); }
function blockHtml(b, i) {
  let inner = '';
  if (b.type === 'text') inner = `<textarea class="f" rows="6" placeholder="Markdown: ## titlu, **bold**, - listДғ" oninput="POST.blocks[${i}].md=this.value">${esc(b.md || '')}</textarea>`;
  else if (b.type === 'images' || b.type === 'slider') inner = `<label class="f">URL-uri imagini вҖ” cГўte unul pe rГўnd (copiazДғ din Galerie media)</label><textarea class="f" rows="4" oninput="setLines(${i},'urls',this.value)">${esc((b.urls || []).join(NL))}</textarea>
    <label class="f">URL-uri pentru MOBIL (opИӣional вҖ” aceeaИҷi ordine; gol = se folosesc cele de sus)</label><textarea class="f" rows="3" oninput="setLines(${i},'urlsMobile',this.value)">${esc((b.urlsMobile || []).join(NL))}</textarea>`;
  else if (b.type === 'compare') inner = `
    <div style="display:flex;gap:10px"><input class="f" placeholder="Titlu coloana A" value="${esc(b.title_a || '')}" oninput="POST.blocks[${i}].title_a=this.value" />
    <input class="f" placeholder="Titlu coloana B" value="${esc(b.title_b || '')}" oninput="POST.blocks[${i}].title_b=this.value" /></div>
    <label class="f">RГўnduri вҖһA | B" вҖ” cГўte unul pe rГўnd</label><textarea class="f" rows="4" placeholder="Ping-pong Иҷi videoproiector | Biliard Иҷi cramДғ" oninput="setRows(${i},this.value)">${esc((b.rows || []).map((r) => r.a + ' | ' + r.b).join(NL))}</textarea>`;
  else if (b.type === 'checklist') inner = `<input class="f" placeholder="Titlul listei (opИӣional)" value="${esc(b.title || '')}" oninput="POST.blocks[${i}].title=this.value" />
    <label class="f">Elemente вҖ” cГўte unul pe rГўnd</label><textarea class="f" rows="4" oninput="setLines(${i},'items',this.value)">${esc((b.items || []).join(NL))}</textarea>`;
  return `<div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><b style="margin-right:auto">${BLOCK_LABELS[b.type] || b.type}</b>
      <button class="btn s" onclick="mvBlock(${i},-1)" title="MutДғ sus">вҶ‘</button>
      <button class="btn s" onclick="mvBlock(${i},1)" title="MutДғ jos">вҶ“</button>
      <button class="btn d" onclick="delBlock(${i})">Г—</button></div>
    ${inner}</div>`;
}
function pf(k, label, area, rows) {
  const v = esc(POST[k] || '');
  return `<label class="f">${label}</label>` + (area
    ? `<textarea class="f" rows="${rows || 3}" oninput="POST['${k}']=this.value">${v}</textarea>`
    : `<input class="f" value="${v}" oninput="POST['${k}']=this.value" />`);
}
function renderPostEditor() {
  $('main').innerHTML = `
    <div class="sec-head"><div><h1>${POST.id ? 'EditeazДғ articol' : 'Articol nou'}</h1></div>
      <span class="badge ${POST.published_at ? 'pub' : 'mod'}">${POST.published_at ? 'Publicat' : 'Draft'}</span></div>

async function renderMedia() {

    <div class="mgrid">${MEDIA.map((m) => `
      <div class="mcard">

      </div>`).join('')}</div>`;
  const drop = $('drop'), file = $('file');
  drop.onclick = () => file.click();
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('on'); };
  drop.ondragleave = () => drop.classList.remove('on');
  drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('on'); uploadFiles(e.dataTransfer.files); };
  file.onchange = () => uploadFiles(file.files);
}
/* optimizare Г®n browser: redimensionare canvas + WebP (fallback JPEG unde nu e suportat) */
function resizeImage(img, maxW, quality) {
  const scale = Math.min(1, maxW / img.naturalWidth);
  const w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(img, 0, 0, w, h);
  const webp = c.toDataURL('image/webp', quality);
  if (webp.startsWith('data:image/webp')) return { b64: webp.split(',')[1], mime: 'image/webp' };
  return { b64: c.toDataURL('image/jpeg', quality).split(',')[1], mime: 'image/jpeg' };
}
async function uploadFiles(files) {
  for (const f of files) {
    toast('Se Г®ncarcДғ ' + f.name + 'вҖҰ');
    try {
      const img = await new Promise((res, rej) => {
        const url = URL.createObjectURL(f);
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = () => rej(new Error('FiИҷierul nu e o imagine validДғ'));
        i.src = url;
      });
      const main = resizeImage(img, 1920, 0.8);
      const thumb = resizeImage(img, 480, 0.72);
      await api('/api/v1/media', {
        method: 'POST',
        body: JSON.stringify({
          filename: f.name, mainBase64: main.b64, thumbBase64: thumb.b64, mime: main.mime,
          width: Math.min(img.naturalWidth, 1920),
          height: Math.round(img.naturalHeight * Math.min(1, 1920 / img.naturalWidth)),
        }),
      });
      URL.revokeObjectURL(img.src);
    } catch (e) { toast('Eroare: ' + e.message); return; }
  }
  toast('ГҺncДғrcat вң“');
  renderMedia();
}
