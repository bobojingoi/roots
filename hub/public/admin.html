<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Roots Hub · Administrare</title>
<style>
  :root{--brand:#157a55;--brand-d:#0f6e56;--brand-soft:#e1f5ee;--bg:#f5f7f6;--ink:#14201b;--muted:#5c6b64;--line:#e3e8e5;--red:#a32d2d;--amber:#ba7517}
  *{box-sizing:border-box;margin:0}
  body{font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px}
  a{color:var(--brand);text-decoration:none}
  /* topbar */
  .top{background:#0e1f19;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 22px}
  .top .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.02em}
  .top .logo .dot{width:30px;height:30px;border-radius:9px;background:var(--brand);display:grid;place-items:center}
  .top .logo small{display:block;font-weight:600;font-size:10.5px;letter-spacing:.14em;color:#9fd9c3}
  .top .acts{display:flex;align-items:center;gap:10px;font-size:13px}
  .top .acts span{color:#c8d5cf;margin-right:6px}
  .top button{background:#1c3129;border:1px solid #2c463b;color:#fff;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .top button:hover{background:#25423
6}
  /* layout */
  .wrap{display:grid;grid-template-columns:250px 1fr;gap:18px;padding:18px;max-width:1280px;margin:0 auto}
  @media(max-width:860px){.wrap{grid-template-columns:1fr}}
  .side{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(20,32,27,.06);padding:12px;height:fit-content;position:sticky;top:18px}
  .nav-i{display:flex;align-items:center;gap:10px;width:100%;padding:11px 13px;border:none;background:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;text-align:left}
  .nav-i:hover{background:var(--brand-soft);color:var(--brand-d)}
  .nav-i.on{background:var(--brand-soft);color:var(--brand-d)}
  .nav-i svg{width:18px;height:18px;flex-shrink:0}
  .nav-cap{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9aa8a1;padding:12px 13px 6px}
  main{min-width:0}
  h1{font-size:22px;margin-bottom:4px}
  .lead{color:var(--muted);font-size:13.5px;margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(20,32,27,.06);padding:20px;margin-bottom:16px}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
  .kpi b{display:block;font-size:26px;margin-top:6px}
  .kpi span{color:var(--muted);font-size:12.5px}
  /* editor */
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .sec-head h2{font-size:17px}
  .badge{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:100px}
  .badge.pub{background:var(--brand-soft);color:var(--brand-d)}
  .badge.mod{background:#faeeda;color:var(--amber)}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand-d)}
  .btn.s{background:#fff;border:1.5px solid var(--line);color:var(--ink)}.btn.s:hover{border-color:var(--brand);color:var(--brand-d)}
  .btn.d{background:#fff;border:1.5px solid #f0c9c9;color:var(--red)}
  label.f{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 5px;text-transform:capitalize}
  input.f,textarea.f{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
  input.f:focus,textarea.f:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,122,85,.12)}
  textarea.f{resize:vertical;min-height:64px}
  .arr{border:1px dashed var(--line);border-radius:12px;padding:12px;margin-top:6px}
  .arr-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;position:relative;background:#fbfcfb}
  .arr-item .rm{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;font-size:15px}
  .add{background:var(--brand-soft);color:var(--brand-d);border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit}
  /* media */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mcard{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .mcard img{width:100%;height:110px;object-fit:cover;display:block}
  .mcard .mi{padding:8px}
  .mcard input{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit}
  .mcard .del{width:100%;margin-top:6px;background:none;border:none;color:var(--red);font-size:11.5px;font-weight:700;cursor:pointer}
  .drop{border:2px dashed var(--line);border-radius:14px;padding:28px;text-align:center;color:var(--muted);margin-bottom:16px;cursor:pointer}
  .drop.on{border-color:var(--brand);background:var(--brand-soft)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0e1f19;color:#fff;padding:11px 22px;border-radius:100px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
  .toast.on{opacity:1}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px}
  .vlist{margin-top:10px}
  .vrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  dialog{border:none;border-radius:16px;padding:24px;max-width:420px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  dialog::backdrop{background:rgba(14,31,25,.45)}
</style>
</head>
<body>
<div class="top">
  <div class="logo"><span class="dot">R</span><div>Roots Hub<small>ADMINISTRARE</small></div></div>
  <div class="acts">
    <span id="who"></span>
    <button onclick="openAccount()">Setări cont</button>
    <button onclick="logout()">Deconectare</button>
  </div>
</div>

<div class="wrap">
  <aside class="side" id="nav"></aside>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<dialog id="accDlg">
  <h3 style="margin-bottom:12px">Setări cont</h3>
  <label class="f">Parola curentă *</label><input class="f" type="password" id="accCur" />
  <label class="f">Email nou (opțional)</label><input class="f" type="email" id="accEmail" />
  <label class="f">Parolă nouă (opțional)</label><input class="f" type="password" id="accPass" />
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn p" onclick="saveAccount()">Salvează</button>
    <button class="btn s" onclick="document.getElementById('accDlg').close()">Renunță</button>
  </div>
</dialog>

<script>
/* ============ state ============ */
let ME = null, SECTIONS = [], MEDIA = [], TAB = 'panou', CUR = null;

const SECTION_META = {
  seo:             ['SEO global', 'Meta title, description, keywords, imagine OG'],
  hero:            ['Hero', 'Prima secțiune a site-ului'],
  about:           ['Despre', 'Titlu, paragrafe, statistici'],
  villas:          ['Cardurile vilelor', 'Redwood și Sequoia pe pagina principală'],
  editorial:       ['Blocuri editoriale', 'Blocuri titlu + paragrafe'],
  common:          ['Spații comune', 'Text, facilități, imagine'],
  rules:           ['Regulile casei', 'Intro + listă reguli'],
  testimonials:    ['Testimoniale', 'Rating + recenzii'],
  video:           ['Video', 'Titlu, descriere, URL YouTube'],
  faq:             ['FAQ', 'Întrebări pe categorii'],
  location:        ['Locație', 'Descriere, hartă, repere'],
  contact:         ['Contact & Social', 'Telefon, WhatsApp, email, social'],
  villa_redwood:   ['Pagina vilei', 'Hero, galerii, facilități, politici, Smoobu'],
  villa_sequoia:   ['Pagina vilei', 'Hero, galerii, facilități, politici, Smoobu'],
  welcome_redwood: ['Instrucțiuni oaspeți', 'Cod chei, WiFi, reguli, recomandări'],
  welcome_sequoia: ['Instrucțiuni oaspeți', 'Cod chei, WiFi, reguli, recomandări'],
};

/* meniul e organizat pe PAGINI — fiecare pagină se configurează separat */
const PAGES_NAV = [
  { cap: 'Pagina principală', keys: ['seo', 'hero', 'about', 'villas', 'editorial', 'common', 'rules', 'testimonials', 'video', 'faq', 'location', 'contact'] },
  { cap: 'Vila Redwood', keys: ['villa_redwood', 'welcome_redwood'] },
  { cap: 'Vila Sequoia', keys: ['villa_sequoia', 'welcome_sequoia'] },
];

const ICONS = {
  panou: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>',
  sec: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>',
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5-5 3 3 4-4 4 4"/></svg>',
};

/* ============ helpers ============ */
const $ = (id) => document.getElementById(id);
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2400); }
async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (r.status === 401) { location.href = '/login'; throw new Error('401'); }
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || 'Eroare');
  return j;
}
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

/* ============ nav ============ */
function renderNav() {
  const have = new Set(SECTIONS.map((s) => s.section_key));
  let h = `<button class="nav-i ${TAB === 'panou' ? 'on' : ''}" onclick="go('panou')">${ICONS.panou} Panou</button>`;
  for (const page of PAGES_NAV) {
    const keys = page.keys.filter((k) => have.has(k));
    if (!keys.length) continue;
    h += `<div class="nav-cap">${esc(page.cap)}</div>`;
    for (const k of keys) {
      const [label] = SECTION_META[k] || [k];
      h += `<button class="nav-i ${TAB === 'sec:' + k ? 'on' : ''}" onclick="go('sec:${k}')">${ICONS.sec} ${esc(label)}</button>`;
    }
  }
  // secțiuni noi necunoscute meniului (adăugate ulterior în DB) — să nu dispară
  const known = new Set(PAGES_NAV.flatMap((p) => p.keys));
  const extra = SECTIONS.filter((s) => !known.has(s.section_key));
  if (extra.length) {
    h += `<div class="nav-cap">Alte secțiuni</div>`;
    for (const s of extra) {
      const [label] = SECTION_META[s.section_key] || [s.section_key];
      h += `<button class="nav-i ${TAB === 'sec:' + s.section_key ? 'on' : ''}" onclick="go('sec:${s.section_key}')">${ICONS.sec} ${esc(label)}</button>`;
    }
  }
  h += `<div class="nav-cap">Bibliotecă</div>`;
  h += `<button class="nav-i ${TAB === 'media' ? 'on' : ''}" onclick="go('media')">${ICONS.media} Galerie media</button>`;
  $('nav').innerHTML = h;
}
function go(tab) { TAB = tab; renderNav(); renderMain(); }

/* ============ editor generic (recursiv) ============ */
function fieldHtml(path, key, val) {
  const label = esc(key);
  if (typeof val === 'string') {
    const long = val.length > 80;
    return `<label class="f">${label}</label>` + (long
      ? `<textarea class="f" data-path="${path}">${esc(val)}</textarea>`
      : `<input class="f" data-path="${path}" value="${esc(val)}" />`);
  }
  if (typeof val === 'number') return `<label class="f">${label}</label><input class="f" data-path="${path}" data-num="1" value="${val}" />`;
  if (val === null) return `<label class="f">${label}</label><input class="f" data-path="${path}" placeholder="(gol — ex. URL imagine)" value="" />`;
  if (Array.isArray(val)) {
    let inner = val.map((item, i) =>
      `<div class="arr-item"><button class="rm" onclick="arrRemove('${path}',${i})" title="Șterge">×</button>${objHtml(path + '.' + i, item)}</div>`
    ).join('');
    return `<label class="f">${label}</label><div class="arr">${inner}<button class="add" onclick="arrAdd('${path}')">+ Adaugă element</button></div>`;
  }
  if (typeof val === 'object') return `<label class="f">${label}</label><div class="arr">${objHtml(path, val)}</div>`;
  return '';
}
function objHtml(path, obj) {
  if (typeof obj === 'string') {
    const long = obj.length > 80;
    return long ? `<textarea class="f" data-path="${path}">${esc(obj)}</textarea>` : `<input class="f" data-path="${path}" value="${esc(obj)}" />`;
  }
  if (typeof obj !== 'object' || obj === null) return `<input class="f" data-path="${path}" value="${esc(obj ?? '')}" />`;
  return Object.entries(obj).map(([k, v]) => fieldHtml(path + '.' + k, k, v)).join('');
}
function getByPath(obj, path) { return path.split('.').slice(1).reduce((o, k) => o?.[k], obj); }
function setByPath(obj, path, value) {
  const keys = path.split('.').slice(1);
  let o = obj;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = value;
}
function collectDraft() {
  const draft = JSON.parse(JSON.stringify(CUR.draft));
  document.querySelectorAll('[data-path]').forEach((el) => {
    let v = el.value;
    if (el.dataset.num) v = Number(v) || 0;
    if (v === '' && getByPath({ root: CUR.draft }, el.dataset.path) === null) v = null;
    setByPath({ root: draft }, el.dataset.path, v);
  });
  return draft;
}
function arrRemove(path, idx) {
  CUR.draft = collectDraft();
  const arr = getByPath({ root: CUR.draft }, path);
  arr.splice(idx, 1);
  renderMain();
}
function arrAdd(path) {
  CUR.draft = collectDraft();
  const arr = getByPath({ root: CUR.draft }, path);
  const template = arr.length ? JSON.parse(JSON.stringify(arr[arr.length - 1])) : '';
  const blank = (x) => {
    if (typeof x === 'string') return '';
    if (typeof x === 'number') return 0;
    if (Array.isArray(x)) return [];
    if (x && typeof x === 'object') { const o = {}; for (const k of Object.keys(x)) o[k] = blank(x[k]); return o; }
    return '';
  };
  arr.push(blank(template));
  renderMain();
}

/* ============ views ============ */
async function renderMain() {
  const m = $('main');
  if (TAB === 'panou') {
    const pub = SECTIONS.filter((s) => s.published).length;
    const mod = SECTIONS.filter((s) => s.published && JSON.stringify(s.draft) !== JSON.stringify(s.published)).length;
    m.innerHTML = `
      <h1>Panou de control</h1>
      <div class="lead">Starea conținutului site-ului Roots Villas.</div>
      <div class="grid3">
        <div class="kpi"><span>secțiuni publicate</span><b>${pub} / ${SECTIONS.length}</b></div>
        <div class="kpi"><span>modificări nepublicate</span><b>${mod}</b></div>
        <div class="kpi"><span>imagini în bibliotecă</span><b id="kpiMedia">…</b></div>
      </div>
      <div class="card" style="margin-top:16px">
        <b>API public site</b>
        <div class="hint">Site-ul consumă <code>GET /api/v1/site-content</code> — doar conținutul publicat. Cache-ul se invalidează automat la „Publică".</div>
      </div>`;
    api('/api/v1/media').then((j) => { MEDIA = j.media; const el = $('kpiMedia'); if (el) el.textContent = MEDIA.length; }).catch(() => {});
    return;
  }
  if (TAB === 'media') { renderMedia(); return; }
  if (TAB.startsWith('sec:')) {
    const key = TAB.slice(4);
    CUR = SECTIONS.find((s) => s.section_key === key);
    const [label, sub] = SECTION_META[key] || [key, ''];
    const modified = JSON.stringify(CUR.draft) !== JSON.stringify(CUR.published);
    m.innerHTML = `
      <div class="sec-head">
        <div><h1>${esc(label)}</h1><div class="lead">${esc(sub)}</div></div>
        <span class="badge ${modified ? 'mod' : 'pub'}">${modified ? 'Modificări nepublicate' : 'Publicat'}</span>
      </div>
      <div class="card" id="form">${objHtml('root', CUR.draft)}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn s" onclick="saveDraft()">Salvează draft</button>
        <button class="btn p" onclick="publish()">Publică</button>
        <button class="btn s" onclick="showVersions()">Istoric versiuni</button>
      </div>
      <div class="card vlist" id="versions" style="display:none;margin-top:14px"></div>
      <div class="hint">Sfat: pentru imagini, încarcă întâi în „Galerie media" și lipește URL-ul aici.</div>`;
    return;
  }
}

async function saveDraft() {
  CUR.draft = collectDraft();
  await api('/api/v1/sections/' + CUR.section_key, { method: 'PUT', body: JSON.stringify({ draft: CUR.draft }) });
  toast('Draft salvat');
  renderMain();
}
async function publish() {
  CUR.draft = collectDraft();
  await api('/api/v1/sections/' + CUR.section_key, { method: 'PUT', body: JSON.stringify({ draft: CUR.draft }) });
  await api('/api/v1/sections/' + CUR.section_key + '/publish', { method: 'POST' });
  CUR.published = JSON.parse(JSON.stringify(CUR.draft));
  toast('Publicat — live pe site');
  renderMain();
}
async function showVersions() {
  const el = $('versions');
  const j = await api('/api/v1/sections/' + CUR.section_key + '/versions');
  el.style.display = 'block';
  el.innerHTML = '<b>Ultimele versiuni publicate</b>' + (j.versions.map((v) =>
    `<div class="vrow"><span>${new Date(v.published_at).toLocaleString('ro-RO')}</span>
     <button class="btn s" style="padding:6px 12px" onclick="restoreV(${v.id})">Adu în draft</button></div>`
  ).join('') || '<div class="hint">Nicio versiune încă.</div>');
}
async function restoreV(id) {
  await api(`/api/v1/sections/${CUR.section_key}/restore/${id}`, { method: 'POST' });
  const j = await api('/api/v1/sections');
  SECTIONS = j.sections;
  toast('Versiune adusă în draft — publică pentru a fi live');
  renderMain();
}

/* ============ media ============ */
async function renderMedia() {
  const j = await api('/api/v1/media');
  MEDIA = j.media;
  $('main').innerHTML = `
    <h1>Galerie media</h1>
    <div class="lead">Bibliotecă centrală — imaginile se refolosesc în orice secțiune prin URL.</div>
    <div class="drop" id="drop">📷 Trage imagini aici sau <b>apasă pentru a alege</b><input type="file" id="file" accept="image/*" multiple style="display:none" /></div>
    <div class="mgrid">${MEDIA.map((m) => `
      <div class="mcard">
        <a href="${m.url}" target="_blank"><img src="${m.thumb_url || m.url}" alt="" loading="lazy" /></a>
        <div class="mi">
          <input placeholder="text alternativ (SEO)" value="${esc(m.alt || '')}" onchange="setAlt('${m.id}', this.value)" />
          <input value="${m.url}" onclick="this.select();document.execCommand('copy');toast('URL copiat')" readonly style="margin-top:5px;color:#5c6b64" />
          <button class="del" onclick="delMedia('${m.id}')">Șterge</button>
        </div>
      </div>`).join('')}</div>`;
  const drop = $('drop'), file = $('file');
  drop.onclick = () => file.click();
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('on'); };
  drop.ondragleave = () => drop.classList.remove('on');
  drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('on'); uploadFiles(e.dataTransfer.files); };
  file.onchange = () => uploadFiles(file.files);
}
/* optimizare în browser: redimensionare canvas + JPEG (main 1920px, thumb 480px) */
function resizeToJpeg(img, maxW, quality) {
  const scale = Math.min(1, maxW / img.naturalWidth);
  const w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(img, 0, 0, w, h);
  return c.toDataURL('image/jpeg', quality).split(',')[1];
}
async function uploadFiles(files) {
  for (const f of files) {
    toast('Se încarcă ' + f.name + '…');
    try {
      const img = await new Promise((res, rej) => {
        const url = URL.createObjectURL(f);
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = () => rej(new Error('Fișierul nu e o imagine validă'));
        i.src = url;
      });
      const mainBase64 = resizeToJpeg(img, 1920, 0.82);
      const thumbBase64 = resizeToJpeg(img, 480, 0.75);
      await api('/api/v1/media', {
        method: 'POST',
        body: JSON.stringify({
          filename: f.name, mainBase64, thumbBase64,
          width: Math.min(img.naturalWidth, 1920),
          height: Math.round(img.naturalHeight * Math.min(1, 1920 / img.naturalWidth)),
        }),
      });
      URL.revokeObjectURL(img.src);
    } catch (e) { toast('Eroare: ' + e.message); return; }
  }
  toast('Încărcat ✓');
  renderMedia();
}
async function setAlt(id, alt) { await api('/api/v1/media/' + id, { method: 'PATCH', body: JSON.stringify({ alt }) }); toast('Salvat'); }
async function delMedia(id) { if (!confirm('Ștergi imaginea?')) return; await api('/api/v1/media/' + id, { method: 'DELETE' }); renderMedia(); }

/* ============ cont ============ */
function openAccount() { $('accDlg').showModal(); }
async function saveAccount() {
  try {
    await api('/api/v1/auth/change-credentials', {
      method: 'POST',
      body: JSON.stringify({ currentPassword: $('accCur').value, newEmail: $('accEmail').value || undefined, newPassword: $('accPass').value || undefined }),
    });
    $('accDlg').close();
    toast('Cont actualizat');
  } catch (e) { toast(e.message); }
}
async function logout() { await api('/api/v1/auth/logout', { method: 'POST' }); location.href = '/login'; }

/* ============ init ============ */
(async () => {
  try {
    const me = await api('/api/v1/auth/me');
    ME = me.user;
    $('who').textContent = ME.email + ' · ' + ME.role;
    const j = await api('/api/v1/sections');
    const order = Object.keys(SECTION_META);
    SECTIONS = j.sections.sort((a, b) => order.indexOf(a.section_key) - order.indexOf(b.section_key));
    renderNav();
    renderMain();
  } catch (e) { /* redirected */ }
})();
</script>
